name: build

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:

permissions:
  contents: write   # needed to attach assets when releasing on a tag

jobs:
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build universal binary (arm64 + x86_64)
        run: |
          cc -arch arm64 -arch x86_64 -Wall -o dvs-ptpv2-unlock dvs-ptpv2-unlock.c
          lipo -info dvs-ptpv2-unlock

      - name: Build the self-contained launcher app
        run: ./build-app.sh

      - name: Package a ready-to-use bundle
        run: |
          mkdir -p "dist/dvs-ptpv2-unlock"
          cp dvs-ptpv2-unlock dvs-ptpv2-unlock.conf dvs-ptpv2-unlock.command README.md "dist/dvs-ptpv2-unlock/"
          cp -R "DVS PTPv2 Unlock.app" "dist/dvs-ptpv2-unlock/"
          chmod +x "dist/dvs-ptpv2-unlock/dvs-ptpv2-unlock.command"
          ( cd dist && zip -r ../dvs-ptpv2-unlock-macos.zip "dvs-ptpv2-unlock" )

      - uses: actions/upload-artifact@v4
        with:
          name: dvs-ptpv2-unlock-macos
          path: dvs-ptpv2-unlock-macos.zip

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check PowerShell script syntax
        shell: pwsh
        run: |
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
            "$PWD/dvs-ptpv2-unlock.ps1", [ref]$null, [ref]$errors) | Out-Null
          if ($errors) { $errors | ForEach-Object { Write-Error $_ }; exit 1 }
          Write-Host "PowerShell syntax OK"

      - name: Build dvs-ptpv2-unlock.exe
        shell: cmd
        run: gcc -DWIN32 -O2 -o dvs-ptpv2-unlock.exe dvs-ptpv2-unlock.c

      - name: Package a ready-to-use bundle
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "dist/dvs-ptpv2-unlock" | Out-Null
          Copy-Item dvs-ptpv2-unlock.exe, dvs-ptpv2-unlock.conf, dvs-ptpv2-unlock.ps1, 'DVS PTPv2 Unlock.cmd', README.md "dist/dvs-ptpv2-unlock/"
          Compress-Archive -Path "dist/dvs-ptpv2-unlock" -DestinationPath dvs-ptpv2-unlock-windows.zip -Force

      - uses: actions/upload-artifact@v4
        with:
          name: dvs-ptpv2-unlock-windows
          path: dvs-ptpv2-unlock-windows.zip

  release:
    needs: [macos, windows]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release with macOS + Windows bundles
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            artifacts/dvs-ptpv2-unlock-macos/dvs-ptpv2-unlock-macos.zip \
            artifacts/dvs-ptpv2-unlock-windows/dvs-ptpv2-unlock-windows.zip
