# DVS PTPv2 Unlock configuration
#
# This file is read every time the Dante Virtual Soundcard starts its PTP
# service, so you can change these options and simply restart DVS -- no
# recompiling or reinstalling required.
#
# Accepted values: 1 / 0, true / false, yes / no, on / off (case-insensitive).

# Allow DVS to become the PTP leader (grandmaster) instead of slave-only.
# Drops the "-s" flag that DVS normally passes.
leader = 0

# Enable PTPv2 support (adds "-y2=-2" and mirrors the -m1= interface to -m2=).
ptpv2 = 0
